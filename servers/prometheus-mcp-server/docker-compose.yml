# Docker Compose 配置 - Prometheus MCP Server
# 适用于长期运行的 HTTP 服务模式

services:
  prometheus-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: prometheus-mcp-server:latest
    container_name: prometheus-mcp
    ports:
      - "8000:8000"
    volumes:
      # 挂载配置文件（只读）
      - ./config/config.yaml:/root/.prometheus-mcp/config.yaml:ro
    environment:
      # 日志级别
      - LOG_LEVEL=INFO
      # 时区设置（可选）
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
